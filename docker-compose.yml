services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: videouser
      POSTGRES_PASSWORD: videopassword
      POSTGRES_DB: videoclub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build: ./apps/backend
    ports:
      - "8000:8000"
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://videouser:videopassword@db:5432/videoclub
    depends_on:
      - db
    restart: unless-stopped

  worker:
    build: ./apps/backend
    command: ["uv", "run", "python", "worker.py"]
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://videouser:videopassword@db:5432/videoclub
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
